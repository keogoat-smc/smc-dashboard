<!DOCTYPE html>
<html>
<head>
    <title>SMC Pro Trading Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f19;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #00ffcc;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px;
        }

        .long {
            color: #00ff88;
            font-weight: bold;
        }

        .short {
            color: #ff4d4d;
            font-weight: bold;
        }

        .chart {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>📊 SMC PRO TRADING DASHBOARD</h1>

<button onclick="loadData()">Run Market Scan</button>

<div class="container" id="results"></div>

<script>
async function loadData() {
    const res = await fetch('/scan');
    const data = await res.json();

    let html = '';

    data.forEach(t => {

        html += `
        <div class="card">
            <h2>${t.symbol}</h2>

            <p>Price: ${t.price}</p>
            <p class="long">Signal: ${t.type}</p>
            <p>SL: ${t.sl}</p>
            <p>TP: ${t.tp}</p>
            <p>Risk: $${t.risk.toFixed(2)}</p>
            <p>Score: ${t.score || 0}</p>

            <div class="chart">
                <iframe
                    src="https://s.tradingview.com/widgetembed/?symbol=OANDA:${t.symbol}&interval=D&theme=dark"
                    width="100%"
                    height="260"
                    frameborder="0">
                </iframe>
            </div>

        </div>
        `;
    });

    document.getElementById('results').innerHTML = html;
}
</script>

</body>
</html>
