<!DOCTYPE html>
<html>
<head>
    <title>SMC Pro Trading Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b0f19;
            color: white;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
            padding: 20px;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #111827;
            border-radius: 12px;
            padding: 15px;
        }

        .long { color: #00ff88; }
        .short { color: #ff4d4d; }
    </style>
</head>

<body>

<h1>📊 SMC PRO TRADING DASHBOARD</h1>

<button onclick="loadData()">Run Market Scan</button>

<div class="container" id="results"></div>

<script>

async function loadData() {

    const res = await fetch('/scan');
    const data = await res.json();

    let html = '';

    data.forEach(t => {

        html += `
        <div class="card">

            <h2>${t.symbol}</h2>

            <p>Price: ${t.price}</p>

            <p class="${t.type === 'LONG' ? 'long' : 'short'}">
                Signal: ${t.type}
            </p>

            <p>SL: ${t.sl}</p>
            <p>TP: ${t.tp}</p>
            <p>Risk: ${t.risk}</p>
            <p>Score: ${t.score}</p>

            <canvas id="chart-${t.symbol}" height="120"></canvas>

        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;

    setTimeout(() => {

        data.forEach(t => {

            const ctx = document
                .getElementById(`chart-${t.symbol}`)
                .getContext("2d");

            new Chart(ctx, {
                type: "line",
                data: {
                    labels: ["Prev", "Now"],
                    datasets: [{
                        data: [t.price * 0.99, t.price],
                        borderColor: "#00ffcc",
                        tension: 0.4,
                        pointRadius: 3
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    responsive: true
                }
            });

        });

    }, 200);

}

</script>

</body>
</html>
