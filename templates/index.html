<!DOCTYPE html>
<html>
<head>
    <title>SMC Pro Trading Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f19;
            color: white;
        }

        h1 {
            text-align: center;
            color: #00ffcc;
            padding: 20px;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #00ffcc;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px;
        }

        .long {
            color: #00ff88;
            font-weight: bold;
        }

        .short {
            color: #ff4d4d;
            font-weight: bold;
        }

        iframe {
            margin-top: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>📊 SMC PRO TRADING DASHBOARD</h1>

<button onclick="loadData()">Run Market Scan</button>

<div class="container" id="results"></div>

<script>

const symbolMap = {
    "GOLD": "OANDA:XAUUSD",
    "GBPJPY": "OANDA:GBPJPY",
    "USDJPY": "OANDA:USDJPY"
};

async function loadData() {

    const res = await fetch('/scan');
    const data = await res.json();

    let html = '';

    data.forEach(t => {

        const tvSymbol =
            symbolMap[t.symbol] || "OANDA:XAUUSD";

        html += `
        <div class="card">

            <h2>${t.symbol}</h2>

            <p>Price: ${t.price}</p>

            <p class="${
                t.type === 'SHORT'
                    ? 'short'
                    : 'long'
            }">
                Signal: ${t.type}
            </p>

            <p>SL: ${t.sl}</p>
            <p>TP: ${t.tp}</p>
            <p>Risk: $${t.risk}</p>
            <p>Score: ${t.score}</p>

            <iframe
                src="https://s.tradingview.com/widgetembed/?symbol=${tvSymbol}&interval=D&theme=dark"
                width="100%"
                height="260">
            </iframe>

        </div>
        `;
    });

    document.getElementById('results').innerHTML = html;
}

</script>

</body>
</html>
